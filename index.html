<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FoodTrace</title>

<meta name="description" content="Masada QR kodu okutun. İçerik, menşei, alerjenler ve tazelik bilgilerine anında ulaşın." />

<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;1,500&family=Mulish:wght@300;400;600&display=swap" rel="stylesheet" />

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green:#1a9e74;
  --green-dk:#0e6b4f;
  --green-lt:#e3f5ee;
  --text:#1a1a1a;
  --muted:#6b7280;
  --border:#e5e7eb;
  --bg:#f9faf8;
  --white:#ffffff;
}

body {
  font-family:'Mulish', sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:1rem 1.5rem;
  background:var(--white);
  border-bottom:1px solid var(--border);
}

.logo {
  font-family:'Lora', serif;
}

.logo span { color:var(--green); }

.nav-pill {
  font-size:0.65rem;
  font-weight:600;
  text-transform:uppercase;
  background:var(--green-lt);
  color:var(--green-dk);
  padding:4px 12px;
  border-radius:999px;
}

main {
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:3rem 1.5rem;
  text-align:center;
  max-width:480px;
  margin:auto;
}

.eyebrow {
  font-size:0.65rem;
  letter-spacing:0.14em;
  text-transform:uppercase;
  color:var(--green);
  margin-bottom:1rem;
}

h1 {
  font-family:'Lora', serif;
  font-size:clamp(2rem,7vw,2.8rem);
  margin-bottom:1rem;
}

h1 em { color:var(--green); }

.sub {
  font-size:1rem;
  color:var(--muted);
  margin-bottom:2rem;
}

.cta {
  background:var(--green);
  color:white;
  padding:14px 30px;
  border-radius:8px;
  text-decoration:none;
  font-weight:600;
  display:block;
  width:100%;
  max-width:300px;
}

.cta:hover { background:var(--green-dk); }

.trust {
  margin-top:1rem;
  font-size:0.75rem;
  color:var(--muted);
}

footer {
  text-align:center;
  font-size:0.7rem;
  padding:1rem;
}
</style>
</head>

<body>

<nav>
  <span class="logo">Food<span>Trace</span></span>
  <span class="nav-pill">Erken Erişim</span>
</nav>

<main>

  <div class="eyebrow">Yemek şeffaflığı artık mümkün</div>

  <h1>
    Yemeğini okut.<br>
    <em>Nereden geldiğini öğren.</em>
  </h1>

  <p class="sub">
    İçerik, tazelik, alerjen ve menşei bilgilerine saniyeler içinde ulaş.
  </p>

  <a class="cta" href="demo.html">
    Deneyimi Başlat →
  </a>

  <p class="trust">
    🔒 Akademik proje · Spam yok · Ücretsiz
  </p>

</main>

<footer>
  FoodTrace · MVP · Dijital Pazarlama Projesi
</footer>

<script>
var t0 = Date.now();
document.querySelector('.cta').addEventListener('click', function() {
  var seconds = Math.round((Date.now() - t0) / 1000);
  try { localStorage.setItem('ft_landing_time', seconds); } catch(e) {}
});
</script>

</body>
</html>
