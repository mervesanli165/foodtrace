<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FoodTrace</title>
<meta name="description" content="Scan a QR code at your table. See ingredient origin, allergens, freshness and certifications instantly." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;1,500&family=Mulish:wght@300;400;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green:    #1a9e74;
    --green-dk: #0e6b4f;
    --green-lt: #e3f5ee;
    --text:     #1a1a1a;
    --muted:    #6b7280;
    --border:   #e5e7eb;
    --bg:       #f9faf8;
    --white:    #ffffff;
  }

  html, body {
    height: 100%;
  }

  body {
    font-family: 'Mulish', sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 1.5rem;
    background: var(--white);
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Lora', serif;
    font-size: 1.2rem;
    color: var(--text);
  }
  .logo span { color: var(--green); }

  .nav-pill {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: var(--green-lt);
    color: var(--green-dk);
    padding: 4px 12px;
    border-radius: 999px;
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem;
    text-align: center;
    max-width: 480px;
    margin: 0 auto;
    width: 100%;
  }

  .eyebrow {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 1.1rem;
  }

  h1 {
    font-family: 'Lora', serif;
    font-size: clamp(2rem, 7vw, 2.8rem);
    line-height: 1.2;
    letter-spacing: -0.02em;
    margin-bottom: 1rem;
  }

  h1 em {
    font-style: italic;
    color: var(--green);
  }

  .sub {
    font-size: 1rem;
    font-weight: 300;
    color: var(--muted);
    line-height: 1.65;
    margin-bottom: 2.25rem;
    max-width: 340px;
  }

  .cta {
    display: inline-block;
    background: var(--green);
    color: #fff;
    font-family: 'Mulish', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    padding: 15px 36px;
    border-radius: 8px;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: background 0.15s;
    width: 100%;
    max-width: 320px;
  }
  .cta:hover { background: var(--green-dk); }

  .trust {
    margin-top: 1.1rem;
    font-size: 0.7rem;
    color: var(--muted);
  }

  footer {
    text-align: center;
    padding: 1.25rem;
    border-top: 1px solid var(--border);
    font-size: 0.68rem;
    color: #c0c5cc;
  }
</style>
</head>
<body>

<nav>
  <span class="logo">Food<span>Trace</span></span>
  <span class="nav-pill">Early Access</span>
</nav>

<main>
  <div class="eyebrow">Food transparency, finally</div>
  <h1>Scan your food.<br><em>Know where it comes from.</em></h1>
  <p class="sub">See ingredients, freshness, allergens, and sourcing details in seconds.</p>
  <a class="cta" href="demo.html">Get Early Access &#8594;</a>
  <p class="trust">&#128274; Academic project &middot; No spam &middot; Free</p>
</main>

<footer>
  FoodTrace &middot; Lean Startup MVP &middot; Digital Marketing Project
</footer>

<script>
  // Track time on page before clicking CTA
  var t0 = Date.now();
  document.querySelector('.cta').addEventListener('click', function() {
    var seconds = Math.round((Date.now() - t0) / 1000);
    try { localStorage.setItem('ft_landing_time', seconds); } catch(e) {}
  });
</script>
</body>
</html>
