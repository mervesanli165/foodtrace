<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FoodTrace — Geri Bildirim</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

:root{
  --green-dark:#1B4332;
  --green-mid:#2D6A4F;
  --green:#1B8A5A;
  --green-pale:#E4F5EC;
  --cream:#F7F4EE;
  --cream-dark:#EDE9E3;
  --text:#1C1A17;
  --text-muted:#6B6560;
}

html,body{
  height:100%;
  background:#D0CCC4;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'DM Sans',sans-serif;
  overflow:hidden;
}

.iphone{
  width:375px;
  height:812px;
  background:#111;
  border-radius:54px;
  padding:12px;
  box-shadow:
  0 0 0 1px #333,
  0 40px 100px rgba(0,0,0,0.55),
  0 10px 30px rgba(0,0,0,0.35);
  position:relative;
}

.screen{
  width:100%;
  height:100%;
  border-radius:44px;
  overflow:hidden;
  background:var(--cream);
  position:relative;
  display:flex;
  flex-direction:column;
}

.statusbar{
  height:48px;
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  padding:0 22px 8px;
  font-size:13px;
}

.content{
  flex:1;
  padding:20px 22px 30px;
  overflow:auto;
}

.back-btn{
  text-decoration:none;
  color:var(--green);
  font-size:13px;
  font-weight:600;
  margin-bottom:18px;
  display:inline-block;
}

.hero{
  background:white;
  border-radius:28px;
  padding:28px 24px;
  text-align:center;
  box-shadow:0 8px 30px rgba(0,0,0,0.06);
  margin-bottom:18px;
}

.hero-icon{
  width:72px;
  height:72px;
  border-radius:22px;
  background:var(--green-pale);
  margin:0 auto 18px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:34px;
}

.hero-title{
  font-family:'Playfair Display',serif;
  font-size:30px;
  line-height:1.15;
  color:var(--text);
  margin-bottom:12px;
}

.hero-sub{
  font-size:14px;
  line-height:1.65;
  color:var(--text-muted);
}

.form-card{
  background:white;
  border-radius:24px;
  overflow:hidden;
  box-shadow:0 8px 30px rgba(0,0,0,0.05);
}

iframe{
  width:100%;
  height:600px;
  border:none;
}

.bottom-actions{
  margin-top:20px;
  display:flex;
  gap:10px;
}

.secondary-btn{
  width:56px;
  height:56px;
  border-radius:18px;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  color:var(--green);
  font-size:22px;
  box-shadow:0 4px 18px rgba(0,0,0,0.05);
}

.primary-btn{
  flex:1;
  height:56px;
  border-radius:18px;
  background:var(--green);
  color:white;
  text-decoration:none;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:600;
  font-size:15px;
  box-shadow:0 8px 25px rgba(27,138,90,0.28);
}
</style>
</head>

<body>

<div class="iphone">

<div class="screen">

<div class="statusbar">
<div>09:41</div>
<div>●●● WiFi 🔋</div>
</div>

<div class="content">

<a class="back-btn" href="demo.html">
← Ürün Bilgisine Dön
</a>

<div class="hero">

<div class="hero-icon">
💬
</div>

<div class="hero-title">
Görüşünüz Bizim İçin Değerli
</div>

<div class="hero-sub">
FoodTrace deneyimini geliştirmek için kısa geri bildiriminizi paylaşabilirsiniz.
</div>

</div>

<div class="form-card">

<iframe
src="https://docs.google.com/forms/d/e/1FAIpQLSeTH4UfHvGQUlXz3dArdPwJe8DefNvU6nWClFVWwn8pPyZqHA/viewform?embedded=true">
Yükleniyor…
</iframe>

</div>

<div class="bottom-actions">

<a class="secondary-btn" href="demo.html">
←
</a>

<a class="primary-btn" href="index.html">
Başa Dön
</a>

</div>

</div>

</div>

</div>

</body>
</html>
