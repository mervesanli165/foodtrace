<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FoodTrace — Anket</title>

<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;1,500&family=Mulish:wght@300;400;600&display=swap" rel="stylesheet" />

<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

:root {
  --green:#1a9e74;
  --green-dk:#0e6b4f;
  --green-lt:#e3f5ee;
  --text:#1a1a1a;
  --muted:#6b7280;
  --border:#e5e7eb;
}

body {
  font-family:'Mulish', sans-serif;
  color:var(--text);
  min-height:100vh;

  background:
    linear-gradient(rgba(255,255,255,0.9), rgba(255,255,255,0.95)),
    url("food-bg.png.png");

  background-size:cover;
  background-position:center;
}

nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:1rem 1.5rem;
  background:rgba(255,255,255,0.9);
  border-bottom:1px solid var(--border);
}

.logo {
  font-family:'Lora', serif;
  text-decoration:none;
  color:var(--text);
  font-size:1.2rem;
}

.logo span { color:var(--green); }

.step-label {
  font-size:0.65rem;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:0.08em;
}

main {
  max-width:520px;
  margin:0 auto;
  padding:2rem 1rem 3rem;
  text-align:center;
}

h1 {
  font-family:'Lora', serif;
  font-size:1.6rem;
  line-height:1.3;
  margin-bottom:0.75rem;
}

.sub {
  font-size:0.9rem;
  color:var(--muted);
  line-height:1.6;
  margin-bottom:1.5rem;
}

.form-container {
  width:100%;
  background:rgba(255,255,255,0.96);
  border-radius:16px;
  padding:0.5rem;
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

iframe {
  width:100%;
  height:780px;
  border:none;
  border-radius:12px;
}

footer {
  text-align:center;
  padding:1.25rem;
  font-size:0.7rem;
  color:#9ca3af;
}
</style>
</head>

<body>

<nav>
  <a class="logo" href="index.html">Food<span>Trace</span></a>
  <span class="step-label">Adım 3 / 3</span>
</nav>

<main>

  <h1>Deneyiminizi değerlendirin</h1>

  <p class="sub">
    QR kod ile bilgiye ulaşma deneyimini test ediyoruz. 
    Geri bildiriminiz, bu sistemi geliştirmemize yardımcı olacaktır.
  </p>

  <div class="form-container">
    <iframe 
      src="https://docs.google.com/forms/d/e/1FAIpQLSeTH4UfHvGQUlXz3dArdPwJe8DefNvU6nWClFVWwn8pPyZqHA/viewform?embedded=true"
      loading="lazy">
      Yükleniyor…
    </iframe>
  </div>

</main>

<footer>
  FoodTrace · MVP · Dijital Pazarlama Projesi
</footer>

</body>
</html>
