<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoodTrace - Deneyim</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f8f8f8;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 400px;
      margin: 100px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
      font-size: 20px;
      margin-bottom: 20px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      background-color: #000;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 16px;
    }

    .btn:hover {
      background-color: #333;
    }

    .note {
      margin-top: 15px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>

<body>

  <div class="container">

    <h2>
      Bu deneyimi (QR okuma → bilgiye ulaşma) ne kadar kolay ve anlaşılır buldunuz?
    </h2>

    <a href="https://bit.ly/4tPMuAT" target="_blank" class="btn" onclick="trackClick()">
      Ankete Devam Et
    </a>

    <div class="note">
      Kısa bir anket (10 saniye)
    </div>

  </div>

  <script>
    function trackClick() {
      localStorage.setItem("survey_clicked", "yes");
    }
  </script>

</body>
</html>
